name: Run Codex Task

on:
  workflow_dispatch:
    inputs:
      task_prompt:
        description: "Task for Codex to perform"
        required: true
        type: string

jobs:
  codex-task:
    runs-on: [self-hosted, linux, x64, orchestrator]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Codex via official action
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ github.event.inputs.task_prompt }}
