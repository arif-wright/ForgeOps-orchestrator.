name: Run Codex Task

on:
  workflow_dispatch:
    inputs:
      task_prompt:
        description: "Task for Codex to perform"
        required: true
        type: string

jobs:
  codex-task:
    runs-on: [self-hosted, linux, x64, orchestrator]
    env:
      CODEX_HOME: ${{ runner.temp }}/codex-home

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare isolated Codex home
        run: |
          rm -rf "$CODEX_HOME"
          mkdir -p "$CODEX_HOME"

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ github.event.inputs.task_prompt }}
          safety-strategy: unsafe
          sandbox: danger-full-access
