name: Run Codex Task

on:
  workflow_dispatch:
    inputs:
      task_prompt:
        description: "Task for Codex to perform"
        required: true
        type: string
      branch_prefix:
        description: "Branch prefix for generated changes"
        required: false
        default: "forgeops/task"
        type: string
      commit_message:
        description: "Commit message for generated changes"
        required: false
        default: "ForgeOps: apply Codex-generated changes"
        type: string
      pr_title:
        description: "Pull request title"
        required: false
        default: "ForgeOps generated changes"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-task:
    runs-on: [self-hosted, linux, x64, orchestrator]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare isolated Codex home
        shell: bash
        run: |
          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          rm -rf "$CODEX_HOME"
          mkdir -p "$CODEX_HOME"
          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ github.event.inputs.task_prompt }}
          safety-strategy: unsafe
          sandbox: danger-full-access

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Validation check
        shell: bash
        run: |
          python3 -m py_compile src/main.py src/models.py src/planner.py

      - name: Show changed files
        shell: bash
        run: |
          echo "Changed files:"
          git status --short || true

      - name: Set branch name
        shell: bash
        run: |
          BRANCH_NAME="${{ github.event.inputs.branch_prefix }}-${{ github.run_id }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "Using branch: $BRANCH_NAME"

      - name: Commit and push changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
            echo "No changes detected. Skipping commit and push."
            exit 0
          fi

          git config user.name "forgeops-runner"
          git config user.email "actions@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add .

          git commit -m "${{ github.event.inputs.commit_message }}"
          git push origin "$BRANCH_NAME"

          echo "HAS_CHANGES=true" >> "$GITHUB_ENV"

      - name: Create pull request
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "${{ github.event.inputs.pr_title }}" \
            --body "Generated by ForgeOps via Codex on the self-hosted runner." \
          || echo "PR may already exist or branch may have no diff."
