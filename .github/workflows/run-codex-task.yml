name: Run Codex Task

on:
  workflow_dispatch:
    inputs:
      task_prompt:
        description: "Task for Codex to perform"
        required: true
        type: string

jobs:
  codex-task:
    runs-on: [self-hosted, linux, x64, orchestrator]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify auth env exists
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is missing"
            exit 1
          fi
          echo "OPENAI_API_KEY is set"

      - name: Run Codex task
        run: |
          codex exec \
            --skip-git-repo-check \
            --dangerously-bypass-approvals-and-sandbox \
            "${{ github.event.inputs.task_prompt }}"
